<mat-card>
  <form (submit)="onAddPost(postForm)" #postForm="ngForm">
    <mat-form-field>
        <input
        matInput
        type="text"
        name="title"
        ngModel
        required
        minlength="2"
        placeholder="Add a Title"
        #title="ngModel">
      <mat-error *ngIf="title.invalid">Please enter a valid title </mat-error>
    </mat-form-field>

    <mat-form-field>
        <textarea
        matInput
        rows="5"
        name="content"
        ngModel
        required
        placeholder="Add a Post"
        #content="ngModel"></textarea>
      <mat-error *ngIf="content.invalid">Please enter valid content</mat-error>
    </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    type="submit">Submit Post
  </button>

  </form>


</mat-card>
