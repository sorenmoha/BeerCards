<mat-accordion multi="true" *ngIf="posts.length > 0">
  <mat-card *ngFor="let post of posts">
    <mat-card-title>
      {{post.title}}
    </mat-card-title>
    <p> {{post.type}} </p>
    <p> {{post.abv}}</p>
    <p> {{post.rating}}</p>
    <p> {{post.content}} </p>
    <mat-card-actions>
      <button mat-button color="accent">EDIT</button>
      <button mat-button color="warn">DELETE</button>
    </mat-card-actions>
  </mat-card>
</mat-accordion>

<p class= "info-text mat-body-1" *ngIf="posts.length <=0">No posts added yet</p>
