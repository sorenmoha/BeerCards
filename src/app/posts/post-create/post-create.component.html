<mat-card>
  <form (submit)="onAddPost(postForm)" #postForm="ngForm">
    <mat-form-field>
        <input
        matInput
        type="text"
        name="title"
        ngModel
        required
        minlength="2"
        placeholder="Add a Beer"
        #title="ngModel">
      <mat-error *ngIf="title.invalid">Please enter a valid title </mat-error>
    </mat-form-field>

    <mat-form-field>
      <mat-select
        matInput
        type="text"
        name="type"
        placeholder="Type of Beer"
        ngModel
        required
        #type="ngModel"
      >

        <mat-option value="" disabled selected>None</mat-option>
        <mat-option value="Pilsner">Pilsner</mat-option>
        <mat-option value="Lager">Lager</mat-option>
        <mat-option value="IPA">IPA</mat-option>
        <mat-option value="Hazy IPA">Hazy IPA</mat-option>
        <mat-option value="Witbier">Witbier</mat-option>
      </mat-select>
      <mat-error *ngIf="type.invalid">Please pick a type </mat-error>
    </mat-form-field>


    <mat-form-field>
      <mat-label>ABV</mat-label>
      <input
      matInput
      required
      name="abv"
      value="ABV"
      type="number"
      placeholder="ABV"
      maxlength="2"
      ngModel
      #abv="ngModel"
      >
    <mat-error *ngIf="abv.invalid">Please enter valid ABV</mat-error>
    </mat-form-field>

    <mat-slider
    ngModel
    #rating="ngModel"
    name="rating"
    type="number"
    value="5"
    min="1"
    max="10"
    step="1.0"
    thumbLabel tickInterval="1"
    required

    >
    <mat-error *ngIf="rating.invalid">Please enter valid rating</mat-error>
   </mat-slider>



    <mat-form-field>
        <textarea
        matInput
        rows="5"
        type="text"
        name="content"
        ngModel
        required
        placeholder="What did you think?"
        #content="ngModel"
        >
      </textarea>
      <mat-error *ngIf="content.invalid">Please enter valid content</mat-error>
    </mat-form-field>

    <button
    mat-raised-button
    color="primary"
    type="submit">Submit Post
    </button>

  </form>


</mat-card>
