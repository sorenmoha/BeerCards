<mat-accordion multi="true" *ngIf="posts.length > 0">
  <mat-card class="card" *ngFor="let post of posts">
    <mat-card-title class="title">
      {{post.title}}
    </mat-card-title>
    <p> {{post.type}} </p>
    <p>ABV: {{post.abv}}%</p>
    <p>User's Rating: {{post.rating}}</p>
    <p>Description: {{post.content}} </p>
    
    <mat-card-actions>
      <button mat-button color="accent">EDIT</button>
      <button mat-button color="warn">DELETE</button>
    </mat-card-actions>
  </mat-card>
</mat-accordion>

<p class= "info-text mat-body-1" *ngIf="posts.length <=0">No posts added yet</p>
